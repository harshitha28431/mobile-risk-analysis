<!DOCTYPE html>
<html>
<head>

<title>Application Risk Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* BODY */
body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #2c3e50, #4ca1af);
    margin:0;
    color:#333;
}

/* NAVBAR */
.navbar{
    position:sticky;
    top:0;
    background: rgba(44, 62, 80, 0.9);
    padding:15px;
    backdrop-filter: blur(10px);
    text-align:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin:0 20px;
    font-weight:500;
    transition:0.3s;
}

.navbar a:hover{
    color:#00d4ff;
}

/* CONTAINER (FIXED) */
.container{
    width:90%;
    max-width:900px;
    margin:40px auto;
    background: rgba(255,255,255,0.95);
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
    text-align:center;
}

/* STATS CARDS */
.stats{
    display:flex;
    justify-content:space-around;
    flex-wrap:wrap;
    margin-top:20px;
}

.card{
    flex:1 1 150px;
    margin:10px;
    padding:20px;
    border-radius:12px;
    color:white;
    font-weight:bold;
    font-size:18px;
}

.high{background:#e74c3c;}
.medium{background:#f39c12;}
.low{background:#27ae60;}

/* CHART */
.chart-container{
    width:100%;
    max-width:400px;
    height:300px;
    margin:30px auto;
}

/* MOBILE */
@media (max-width: 600px){

    .navbar{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
    }

    .navbar a{
        margin:8px;
        font-size:14px;
    }

    .container{
        width:95%;
        margin:20px auto;
        padding:20px;
    }

    .card{
        font-size:16px;
        padding:15px;
    }
}

</style>
</head>

<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/myapps">My Apps</a>
<a href="/compare">Compare Apps</a>
<a href="/dashboard">Dashboard</a>
<a href="/dataset">Dataset Explorer</a>
</div>

<div class="container">

<h1>Application Risk Dashboard</h1>

<div class="stats">

<div class="card high">
High Risk<br>
{{high}}
</div>

<div class="card medium">
Medium Risk<br>
{{medium}}
</div>

<div class="card low">
Low Risk<br>
{{low}}
</div>

</div>

<div class="chart-container">
<canvas id="riskChart"></canvas>
</div>

</div>

<script>

const ctx = document.getElementById('riskChart');

new Chart(ctx, {
    type:'pie',
    data:{
        labels:['High Risk','Medium Risk','Low Risk'],
        datasets:[{
            data:[{{high}}, {{medium}}, {{low}}],
            backgroundColor:[
                '#e74c3c',
                '#f39c12',
                '#27ae60'
            ]
        }]
    },
    options:{
        responsive:true,
        maintainAspectRatio:false,
        plugins:{
            legend:{
                position:'bottom'
            }
        }
    }
});

</script>

</body>
</html>
