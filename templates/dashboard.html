<!DOCTYPE html>
<html>
<head>

<title>Application Risk Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* BODY */
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#f4f7fb;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:230px;
    height:100vh;
    background:#1e293b;
    color:white;
    position:fixed;
    padding:20px;
}

.sidebar h2{
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    padding:12px;
    margin:10px 0;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.sidebar a:hover{
    background:#3b82f6;
}

/* MAIN */
.main{
    margin-left:250px;
    width:100%;
    padding:30px;
}

/* HEADER */
.header{
    font-size:26px;
    font-weight:bold;
    margin-bottom:20px;
}

/* STATS GRID */
.stats{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
    gap:20px;
}

/* CARD */
.card{
    padding:20px;
    border-radius:15px;
    color:white;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.card i{
    font-size:30px;
}

.high{background:#ef4444;}
.medium{background:#f59e0b;}
.low{background:#22c55e;}

/* CHART CARD */
.chart-card{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* CHART */
.chart-container{
    max-width:400px;
    margin:auto;
}

/* MOBILE */
@media(max-width:768px){
    body{flex-direction:column;}

    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .main{
        margin-left:0;
    }
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2><i class="fa-solid fa-shield-halved"></i> Risk App</h2>
    <a href="/"><i class="fa fa-home"></i> Home</a>
    <a href="/myapps"><i class="fa fa-mobile"></i> My Apps</a>
    <a href="/compare"><i class="fa fa-chart-bar"></i> Compare</a>
    <a href="/dashboard"><i class="fa fa-chart-pie"></i> Dashboard</a>
    <a href="/dataset"><i class="fa fa-database"></i> Dataset</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">📊 Application Risk Dashboard</div>

<!-- STATS -->
<div class="stats">

<div class="card high">
<div>
High Risk<br>
{{high}}
</div>
<i class="fa fa-exclamation-triangle"></i>
</div>

<div class="card medium">
<div>
Medium Risk<br>
{{medium}}
</div>
<i class="fa fa-exclamation-circle"></i>
</div>

<div class="card low">
<div>
Low Risk<br>
{{low}}
</div>
<i class="fa fa-check-circle"></i>
</div>

</div>

<!-- CHART -->
<div class="chart-card">

<h3 style="text-align:center;">Risk Distribution</h3>

<div class="chart-container">
<canvas id="riskChart"></canvas>
</div>

</div>

</div>

<script>

new Chart(document.getElementById('riskChart'), {
    type:'pie',
    data:{
        labels:['High Risk','Medium Risk','Low Risk'],
        datasets:[{
            data:[{{high}}, {{medium}}, {{low}}],
            backgroundColor:[
                '#ef4444',
                '#f59e0b',
                '#22c55e'
            ]
        }]
    },
    options:{
        responsive:true,
        plugins:{
            legend:{position:'bottom'}
        }
    }
});

</script>

</body>
</html>
