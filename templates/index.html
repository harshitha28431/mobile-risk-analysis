<!DOCTYPE html>
<html>
<head>
<title>Mobile Risk Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* BODY */
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#f4f7fb;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:230px;
    height:100vh;
    background:#1e293b;
    color:white;
    position:fixed;
    padding:20px;
}

.sidebar h2{
    margin-bottom:30px;
    font-size:20px;
}

.sidebar a{
    display:block;
    padding:12px;
    margin:10px 0;
    color:white;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
}

.sidebar a:hover{
    background:#3b82f6;
}

/* MAIN CONTENT */
.main{
    margin-left:250px;
    width:100%;
    padding:30px;
}

/* HEADER */
.header{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

/* CARD */
.card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
    max-width:500px;
    margin:auto;
    text-align:center;
    position:relative;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#2563eb;
}

/* AUTOCOMPLETE */
.suggestions{
    list-style:none;
    padding:0;
    margin:0;
    background:white;
    border:1px solid #ccc;
    position:absolute;
    width:100%;
    max-height:150px;
    overflow-y:auto;
    z-index:1000;
    text-align:left;
}

.suggestions li{
    padding:10px;
    cursor:pointer;
}

.suggestions li:hover{
    background:#f0f0f0;
}

/* RESULT */
.result{
    margin-top:20px;
}

/* RISK COLORS */
.low{color:#22c55e;}
.medium{color:#f59e0b;}
.high{color:#ef4444;}

/* MOBILE */
@media(max-width:768px){
    body{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .main{
        margin-left:0;
    }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2><i class="fa-solid fa-shield-halved"></i> Risk App</h2>
    <a href="/"><i class="fa fa-home"></i> Home</a>
    <a href="/myapps"><i class="fa fa-mobile"></i> My Apps</a>
    <a href="/compare"><i class="fa fa-chart-bar"></i> Compare</a>
    <a href="/dashboard"><i class="fa fa-chart-pie"></i> Dashboard</a>
    <a href="/dataset"><i class="fa fa-database"></i> Dataset</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
    Mobile Application Risk Analysis System
</div>

<div class="card">

<h2>Analyze Your App</h2>

<form method="POST">

<div style="position:relative;">
<input type="text" id="appInput" name="app_name" placeholder="Enter App Name" required onkeyup="showSuggestions()">
<ul id="suggestions" class="suggestions"></ul>
</div>

<button type="submit">
<i class="fa fa-search"></i> Analyze Risk
</button>

</form>

{% if percentage %}
<div class="result">
<h3>{{app_name}}</h3>
<h2 class="{{level|lower}}">Risk: {{level}}</h2>
<p>{{percentage}}%</p>
<p>{{description}}</p>
</div>
{% endif %}

{% if error %}
<p style="color:red;">{{error}}</p>
{% endif %}

</div>

</div>

<!-- AUTOCOMPLETE SCRIPT -->
<script>

const apps = [
    "WhatsApp","Waze","Weather App","Facebook","Instagram",
    "Snapchat","Telegram","YouTube","Google Maps","Twitter",
    "Amazon","Flipkart","PhonePe","Paytm"
];

function showSuggestions(){
    let input = document.getElementById("appInput").value.toLowerCase();
    let box = document.getElementById("suggestions");

    box.innerHTML = "";

    if(input === "") return;

    let filtered = apps.filter(app => app.toLowerCase().startsWith(input));

    filtered.forEach(app => {
        let li = document.createElement("li");
        li.textContent = app;

        li.onclick = function(){
            document.getElementById("appInput").value = app;
            box.innerHTML = "";
        };

        box.appendChild(li);
    });
}

</script>

</body>
</html>
