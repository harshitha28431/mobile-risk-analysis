<!DOCTYPE html>
<html>
<head>
<title>Mobile Application Risk Analysis</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BODY */
body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #2c3e50, #4ca1af);
    margin:0;
    color:#333;
}

/* NAVBAR */
.navbar{
    position:sticky;
    top:0;
    background: rgba(44, 62, 80, 0.9);
    padding:15px;
    backdrop-filter: blur(10px);
    text-align:center;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin:0 20px;
    font-weight:500;
    transition:0.3s;
}

.navbar a:hover{
    color:#00d4ff;
}

/* MAIN CONTAINER (FIXED) */
.container{
    width:90%;
    max-width:500px;
    margin:40px auto;
    background: rgba(255,255,255,0.95);
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
    text-align:center;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
    margin-top:10px;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background: linear-gradient(45deg, #007bff, #00c6ff);
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* RESULT TEXT */
h2, h3, p{
    margin-top:15px;
}

/* TABLE */
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th{
    background:#2c3e50;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

/* RISK COLORS */
.high{color:#e74c3c;}
.medium{color:#f39c12;}
.low{color:#27ae60;}

/* MOBILE RESPONSIVE */
@media (max-width: 600px){

    .navbar{
        display:flex;
        flex-wrap:wrap;
        justify-content:center;
    }

    .navbar a{
        margin:8px;
        font-size:14px;
    }

    .container{
        width:95%;
        margin:20px auto;
        padding:20px;
    }

    h2{
        font-size:20px;
    }
}

</style>
</head>

<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/myapps">My Apps</a>
<a href="/compare">Compare Apps</a>
<a href="/dashboard">Dashboard</a>
<a href="/dataset">Dataset Explorer</a>
</div>

<div class="container">

<h2>Mobile Application Risk Analysis System</h2>

<form method="POST">
<input type="text" name="app_name" placeholder="Enter App Name" required>
<button type="submit">Analyze Risk</button>
</form>

{% if percentage %}
<h3>{{app_name}}</h3>
<h2 class="{{level|lower}}">Risk: {{level}}</h2>
<p>{{percentage}}%</p>
<p>{{description}}</p>
{% endif %}

{% if error %}
<p style="color:red;">{{error}}</p>
{% endif %}

</div>

</body>
</html>
