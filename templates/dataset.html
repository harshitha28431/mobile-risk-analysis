<!DOCTYPE html>
<html>
<head>

<title>Dataset Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* BODY */
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#f4f7fb;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:230px;
    height:100vh;
    background:#1e293b;
    color:white;
    position:fixed;
    padding:20px;
}

.sidebar h2{
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    padding:12px;
    margin:10px 0;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.sidebar a:hover{
    background:#3b82f6;
}

/* MAIN */
.main{
    margin-left:250px;
    width:100%;
    padding:30px;
}

/* HEADER */
.header{
    font-size:24px;
    font-weight:bold;
    margin-bottom:20px;
}

/* CARD */
.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* SEARCH */
.search-box{
    position:relative;
}

.search-box input{
    width:100%;
    padding:12px 40px 12px 12px;
    border-radius:8px;
    border:1px solid #ccc;
}

.search-box i{
    position:absolute;
    right:12px;
    top:12px;
    color:#666;
}

/* AUTOCOMPLETE */
.suggestions{
    list-style:none;
    padding:0;
    margin:0;
    background:white;
    border:1px solid #ccc;
    position:absolute;
    width:100%;
    max-height:150px;
    overflow-y:auto;
    z-index:1000;
}

.suggestions li{
    padding:10px;
    cursor:pointer;
}

.suggestions li:hover{
    background:#f0f0f0;
}

/* TABLE */
.table-wrapper{
    overflow-x:auto;
    margin-top:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1e293b;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

/* HOVER EFFECT */
tr:hover{
    background:#f1f5f9;
}

/* MOBILE */
@media(max-width:768px){
    body{flex-direction:column;}

    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }

    .main{
        margin-left:0;
    }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2><i class="fa-solid fa-shield-halved"></i> Risk App</h2>
    <a href="/"><i class="fa fa-home"></i> Home</a>
    <a href="/myapps"><i class="fa fa-mobile"></i> My Apps</a>
    <a href="/compare"><i class="fa fa-chart-bar"></i> Compare</a>
    <a href="/dashboard"><i class="fa fa-chart-pie"></i> Dashboard</a>
    <a href="/dataset"><i class="fa fa-database"></i> Dataset</a>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">Dataset Explorer</div>

<div class="card">

<!-- SEARCH -->
<div class="search-box">
<input type="text" id="searchInput" placeholder="Search App Name..." onkeyup="handleSearch()">
<i class="fa fa-search"></i>
<ul id="suggestions" class="suggestions"></ul>
</div>

<!-- TABLE -->
<div class="table-wrapper">

<table id="appTable">

<tr>
<th>App Name</th>
<th>Category</th>
<th>Permission Risk</th>
<th>Comment Risk</th>
<th>Policy Risk</th>
</tr>

{% for row in tables %}
<tr>
<td>{{row.AppName}}</td>
<td>{{row.Category}}</td>
<td>{{row.Privacy_Risk_Score}}</td>
<td>{{row.Comment_Risk_Level}}</td>
<td>{{row.Policy_Risk_Factor}}</td>
</tr>
{% endfor %}

</table>

</div>

</div>

</div>

<script>

// Get app names from table
let appNames = [];
let rows = document.querySelectorAll("#appTable tr");

for(let i=1; i<rows.length; i++){
    let name = rows[i].cells[0].innerText;
    appNames.push(name);
}

function handleSearch(){
    searchApp();
    showSuggestions();
}

// FILTER TABLE
function searchApp(){
    let input=document.getElementById("searchInput").value.toLowerCase();
    let rows=document.getElementById("appTable").getElementsByTagName("tr");

    for(let i=1;i<rows.length;i++){
        let cell=rows[i].getElementsByTagName("td")[0];
        if(cell){
            let text=cell.textContent || cell.innerText;
            rows[i].style.display = text.toLowerCase().includes(input) ? "" : "none";
        }
    }
}

// AUTOCOMPLETE
function showSuggestions(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let box = document.getElementById("suggestions");

    box.innerHTML = "";

    if(input === "") return;

    let filtered = appNames.filter(app => app.toLowerCase().startsWith(input));

    filtered.slice(0,5).forEach(app => {
        let li = document.createElement("li");
        li.textContent = app;

        li.onclick = function(){
            document.getElementById("searchInput").value = app;
            box.innerHTML = "";
            searchApp();
        };

        box.appendChild(li);
    });
}

</script>

</body>
</html>
